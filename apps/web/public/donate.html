<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/img/Icon Dark v1.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#171717" />
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ET990XZDN9"></script>
    <script>
      window.dataLayer = window.dataLayer || []
      function gtag() {
        dataLayer.push(arguments)
      }
      gtag('js', new Date())
      gtag('config', 'G-ET990XZDN9')
    </script>
    <title>Support MENOOWEL — Buy us a coffee on Ko-fi</title>
    <meta
      name="description"
      content="MENOOWEL BrewLab Studio is free. If it helped you brew better, support its development with a coffee on Ko-fi."
    />
    <link rel="canonical" href="https://menoowel.com/donate" />
    <meta property="og:title" content="Support MENOOWEL — Buy us a coffee" />
    <meta property="og:description" content="MENOOWEL BrewLab Studio is free. Support it with a coffee on Ko-fi." />
    <meta property="og:image" content="https://menoowel.com/og.png" />
    <meta property="og:url" content="https://menoowel.com/donate" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        color: #2b2422;
        background:
          radial-gradient(1200px 600px at 82% -12%, rgba(232, 75, 61, 0.12), transparent 60%),
          radial-gradient(900px 520px at -10% 112%, rgba(6, 148, 148, 0.12), transparent 55%),
          #faf7f4;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 440px;
        background: #fff;
        border: 1px solid #ececea;
        border-radius: 20px;
        box-shadow: 0 16px 50px rgba(43, 36, 34, 0.12);
        padding: 32px 28px;
        text-align: center;
      }
      .logo { height: 40px; width: auto; margin-bottom: 18px; }
      h1 { font-size: 22px; margin: 0 0 8px; letter-spacing: -0.01em; }
      p { color: #6f6a67; font-size: 14px; line-height: 1.6; margin: 0 0 22px; }
      .kofi {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: #e84b3d;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        font-size: 15px;
        padding: 13px 26px;
        border-radius: 12px;
        transition: background 0.18s ease, transform 0.18s ease;
      }
      .kofi:hover { background: #d00600; transform: translateY(-2px); }
      .back { display: inline-block; margin-top: 22px; color: #069494; text-decoration: none; font-size: 13px; font-weight: 600; }
      .back:hover { text-decoration: underline; }
      .muted { margin-top: 26px; font-size: 11px; color: #9d9794; }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/img/Logo Light v2.png" alt="MENOOWEL" />
      <h1>Buy us a coffee ☕</h1>
      <p>
        MENOOWEL BrewLab Studio is free and ad-free. If it helped you dial in a better cup, a small tip keeps the
        beans (and the servers) running.
      </p>
      <a class="kofi" href="https://ko-fi.com/firumanusia" target="_blank" rel="noopener">
        ☕ Support on Ko-fi
      </a>
      <div><a class="back" href="/">← Back to the brewing studio</a></div>
      <div class="muted">Crafted by firumanusia &amp; andrisoo</div>
    </div>
  </body>
</html>
